name: 🐞 Bug report
description: Report errors or unexpected behavior.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting issues of FAgram Desktop!

        To make it easier for us to help you please enter detailed information below.
        Make sure this issue is related to FAgram Desktop and not to Telegram Desktop, which is the base of FAgram. If you want to report an issue related to Telegram Desktop, please report it in the [Telegram Desktop repository](https://github.com/telegramdesktop/tdesktop/issues).
  - type: textarea
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. 
        2. 
        3. 
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected behaviour
      placeholder: Tell us what should happen
    validations:
      required: true
  - type: textarea
    attributes:
      label: Actual behaviour
      placeholder: Tell us what happens instead
    validations:
      required: true
  - type: input
    attributes:
      label: Operating system
      description: |
        Write exact OS (e.g. Windows 11, macOS 14, Ubuntu 24.04 GNOME).
        * 🛑 NO KERNEL VERSIONS (uname)
    validations:
      required: true
  - type: input
    attributes:
      label: Version of FAgram Desktop
      description: >
        Please note we don't support versions from Linux distro repositories.
        If you need support for these versions, **please contact your distro maintainer**
        or your distro bugtracker.
        **Don't use 'latest'**, specify actual version, **that's a reason to close your issue**.
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Installation source
      multiple: false
      options:
        - Downloaded from t.me/FAgramDesktop or GitHub
        - Snap
        - Linux package manager (apt, dnf, pacman, etc)
        - Other source
    validations:
      required: true
  - type: input
    attributes:
      label: Crash ID
      description: |
        If the app crashed, we need a Crash ID.
        1. Go to Settings -> Advanced
        2. Enable "Install beta versions"
        3. Reproduce the crash
        4. Copy the Crash ID on next launch
  - type: textarea
    attributes:
      label: Logs
      description: >
        Type the word `viewlogs`
        [directly into your settings menu](https://github.com/telegramdesktop/tdesktop/wiki/Cheat-Codes)
        to open the logs folder.
      placeholder: Insert log.txt here
      render: shell
