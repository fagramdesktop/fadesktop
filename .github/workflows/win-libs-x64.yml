name: Prepare Windows x64 Libraries

on:
  workflow_dispatch:

jobs:
  prepare-libraries:
    name: Prepare Libraries
    runs-on: windows-latest

    env:
      PREPARE_PATH: "Telegram/build/prepare/prepare.py"

    defaults:
      run:
        shell: cmd

    steps:
      - name: Prepare directories
        run: |
          mkdir %userprofile%\TBuild\Libraries
          mklink /d %GITHUB_WORKSPACE%\TBuild %userprofile%\TBuild
          echo TBUILD=%GITHUB_WORKSPACE%\TBuild>>%GITHUB_ENV%
          echo LibrariesPath=%GITHUB_WORKSPACE%\TBuild\Libraries\win64>>%GITHUB_ENV%

      - name: Get repository name
        shell: bash
        run: echo "REPO_NAME=${GITHUB_REPOSITORY##*/}" >> $GITHUB_ENV

      - name: Clone repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          path: ${{ env.TBUILD }}\${{ env.REPO_NAME }}

      - name: Set up environment paths
        shell: bash
        run: |
          DOCPATH=$TBUILD/$REPO_NAME/docs/building-win.md
          SDK="$(grep "SDK version" $DOCPATH | sed -r 's/.*\*\*(.*)\*\* SDK version.*/\1/')"
          echo "SDK=$SDK" >> $GITHUB_ENV

          sed -i '/CMAKE_${lang}_FLAGS_DEBUG_INIT/s/${_Zi}//' "$PROGRAMFILES"/CMake/share/cmake*/Modules/Platform/Windows-MSVC.cmake

          echo "$(sha256sum $TBUILD/$REPO_NAME/$PREPARE_PATH | awk '{ print $1 }')" >> CACHE_KEY.txt
          echo "$SDK" >> CACHE_KEY.txt
          echo "CACHE_KEY=$(sha256sum CACHE_KEY.txt | awk '{ print $1 }')" >> $GITHUB_ENV

          git config --global user.email "you@example.com"
          git config --global user.name "Sample"

      - uses: Eden-CI/msvc-dev-cmd@master
        name: Native Tools Command Prompt
        with:
          arch: x64
          sdk: ${{ env.SDK }}
          toolset: 14.44

      - name: Install ATL
        run: |
          for /f "usebackq tokens=*" %%i in (`"C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath`) do set "VS_PATH=%%i"
          "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vs_installer.exe" modify --installPath "%VS_PATH%" --add Microsoft.VisualStudio.Component.VC.ATL --add Microsoft.VisualStudio.Component.VC.143.ATL --passive --norestart --wait

      - name: NuGet sources
        run: |
          nuget sources Disable -Name "Microsoft Visual Studio Offline Packages"
          nuget sources Add -Source https://api.nuget.org/v3/index.json & exit 0

      - name: Prepare Libraries
        run: |
          cd %TBUILD%
          %REPO_NAME%\Telegram\build\prepare\win.bat silent

      - name: Clean up build intermediates
        run: |
          cd %TBUILD%
          del /S /Q Libraries\*.pdb 2>nul
          del /S /Q Libraries\*.pch 2>nul
          del /S /Q Libraries\*.ilk 2>nul
          del /S /Q Libraries\*.exp 2>nul
          del /S /Q Libraries\*.log 2>nul
          del /S /Q Libraries\*.tlog 2>nul
          for /d /r Libraries %%d in (.git) do @if exist "%%d" rd /s /q "%%d"

      - name: Upload Libraries
        uses: actions/upload-artifact@v7
        with:
          name: libraries-x64
          path: ${{ env.TBUILD }}/Libraries
          retention-days: 30
          compression-level: 1

      - name: Upload ThirdParty
        uses: actions/upload-artifact@v7
        with:
          name: thirdparty-x64
          path: ${{ env.TBUILD }}/ThirdParty
          retention-days: 30
          compression-level: 1
