name: Unused styles updater.

on:
  repository_dispatch:
    types: ["Restart unused_styles_updater workflow."]
  schedule:
    - cron: "0 3 1 * *"
  workflow_dispatch:
jobs:
  Unused-styles:
    runs-on: tenki-standard-medium-4c-8g
    steps:
      - uses: desktop-app/action_code_updater@master
        with:
          type: "unused-styles"