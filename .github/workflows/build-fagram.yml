name: Build & Release

on:
  workflow_dispatch:
    inputs:
      tagname:
        description: "Tag name for the release"
        type: string
        required: true
      build_type:
        description: "Build type"
        type: choice
        required: true
        default: "ci"
        options:
          - ci
          - rel
      libs_run_id:
        description: "Run ID to reuse Windows libraries from (skip rebuild)"
        type: string
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: Build Linux
    uses: ./.github/workflows/build-linux.yml
    with:
      tagname: ${{ inputs.tagname }}
      build_type: ${{ inputs.build_type }}
      skip_upload: true
    secrets: inherit

  build-windows:
    name: Build Windows x64
    uses: ./.github/workflows/win-release-x64.yml
    with:
      tagname: ${{ inputs.tagname }}
      build_type: ${{ inputs.build_type }}
      skip_upload: true
      libs_run_id: ${{ inputs.libs_run_id }}
    secrets: inherit

  upload-telegram:
    name: Upload to Telegram
    needs: [build-linux, build-windows]
    uses: ./.github/workflows/tg-upload.yml
    with:
      tagname: ${{ inputs.tagname }}
      run_id: ${{ github.run_id }}
      build_type: ${{ inputs.build_type }}
    secrets: inherit

  generate-changelog:
    name: Changelog
    needs: [build-linux, build-windows]
    if: inputs.build_type == 'rel'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger changelog workflow on dev branch
        run: |
          gh workflow run changelog.yml --ref dev
        env:
          GH_TOKEN: ${{ secrets.ARPAT }}
          GH_REPO: ${{ github.repository }}

  create-release:
    name: Create Release
    needs: [build-linux, build-windows]
    if: inputs.build_type == 'rel'
    uses: ./.github/workflows/release.yml
    with:
      tagname: ${{ inputs.tagname }}
      linux_run_id: ${{ github.run_id }}
      windows_run_id: ${{ github.run_id }}
    secrets: inherit

  publish-ota:
    name: Publish OTA Update
    needs: [build-linux, build-windows]
    if: inputs.build_type == 'rel'
    uses: ./.github/workflows/publish-ota.yml
    with:
      run_id: ${{ github.run_id }}
    secrets: inherit
