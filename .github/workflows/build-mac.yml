name: Build macOS

on:
  workflow_dispatch:
    inputs:
      tagname:
        description: "tagname"
        type: string
        required: true
      build_type:
        description: "Build type"
        type: choice
        required: true
        default: "ci"
        options:
          - ci
          - rel
  workflow_call:
    inputs:
      tagname:
        description: "tagname"
        type: string
        required: true
      build_type:
        description: "Build type"
        type: string
        required: true
        default: "ci"
      skip_upload:
        description: "Skip Telegram upload"
        type: boolean
        required: false
        default: false

jobs:
  prepare-libraries:
    name: Prepare Libraries
    runs-on: macos-latest
    env:
      PREPARE_PATH: "Telegram/build/prepare/prepare_arm64.py"
      REPO_NAME: ${{ github.event.repository.name || 'fadesktop' }}

    steps:
      - name: Clone repository
        uses: actions/checkout@v7
        with:
          path: ${{ env.REPO_NAME }}
          submodules: recursive

      - name: Free disk space
        run: bash ${{ env.REPO_NAME }}/.github/scripts/free_disk_space_mac.sh

      - name: First set up
        run: |
          sudo chown -R `whoami`:admin /usr/local/share
          brew update
          sudo mdutil -a -i off
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Restore libraries cache
        id: cache-libs
        uses: actions/cache@v6
        with:
          path: |
            Libraries
            ThirdParty
          key: ${{ runner.os }}-libs-${{ hashFiles(format('{0}/{1}', env.REPO_NAME, env.PREPARE_PATH)) }}
          restore-keys: ${{ runner.os }}-libs-

      - name: Install build tools
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: |
          brew untap aws/tap || true
          BREW_PREFIX=$(brew --prefix)
          for formula in automake cmake wget pkg-config gnu-tar ninja nasm meson libtool; do
            if [ -d "$BREW_PREFIX/Cellar/$formula" ]; then
              brew link --overwrite $formula || true
            fi
          done
          HOMEBREW_NO_AUTO_UPDATE=1 brew install automake cmake wget pkg-config gnu-tar ninja nasm meson libtool || true

      - name: Build libraries
        if: steps.cache-libs.outputs.cache-hit != 'true'
        env:
          MAKE_THREADS_CNT: -j3
          CMAKE_BUILD_PARALLEL_LEVEL: 3
        run: |
          set -euo pipefail
          while true; do
            echo "prepare-libraries is still running at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            sleep 240
          done &
          HEARTBEAT_PID=$!
          trap 'kill "$HEARTBEAT_PID" >/dev/null 2>&1 || true' EXIT
          bash ${{ env.REPO_NAME }}/Telegram/build/prepare/mac_arm64.sh silent

      - name: Trim build intermediates
        run: |
          echo "=== Disk usage before trimming ==="
          df -h /
          find Libraries '(' '(' ! '(' -name '*.a' -o -name '*.h' -o -name '*.hpp' -o -name '*.inc' -o -name '*.cmake' -o -path '*/include/*' -o -path '*/objects-*' -o -path '*/cache_keys/*' -o -path '*/patches/*' -o -perm +111 ')' -type f ')' -o -empty ')' -delete
          echo "=== Disk usage after trimming ==="
          df -h /

  build:
    name: Build macOS
    needs: prepare-libraries
    runs-on: macos-latest
    env:
      PREPARE_PATH: "Telegram/build/prepare/prepare_arm64.py"
      REPO_NAME: ${{ github.event.repository.name || 'fadesktop' }}
    outputs:
      tagname: ${{ steps.tagname.outputs.tagname }}
      run_id: ${{ github.run_id }}

    steps:
      - name: Set TAGNAME
        id: tagname
        run: |
          if [ -n "${{ inputs.tagname }}" ]; then
            TAGNAME="${{ inputs.tagname }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAGNAME="${GITHUB_REF#refs/tags/}"
          else
            TAGNAME="${{ github.ref_name }}"
          fi
          echo "TAGNAME=$TAGNAME" >> $GITHUB_ENV
          echo "tagname=$TAGNAME" >> $GITHUB_OUTPUT

      - name: Clone repository
        uses: actions/checkout@v7
        with:
          path: ${{ env.REPO_NAME }}
          submodules: recursive

      - name: Free disk space
        run: bash ${{ env.REPO_NAME }}/.github/scripts/free_disk_space_mac.sh

      - name: Clone DesktopPrivate
        run: |
          git clone https://x-access-token:${{ secrets.PAT }}@github.com/fagramdesktop/DesktopPrivate.git $GITHUB_WORKSPACE/DesktopPrivate

      - name: Restore libraries cache
        uses: actions/cache@v6
        with:
          path: |
            Libraries
            ThirdParty
          key: ${{ runner.os }}-libs-${{ hashFiles(format('{0}/{1}', env.REPO_NAME, env.PREPARE_PATH)) }}
          restore-keys: ${{ runner.os }}-libs-

      - name: Configure with CMake
        run: |
          cd ${{ env.REPO_NAME }}/Telegram
          ./configure.sh \
            -D CMAKE_OSX_ARCHITECTURES=arm64 \
            -D TDESKTOP_API_ID=${{ secrets.API_ID_CONFIG }} \
            -D TDESKTOP_API_HASH=${{ secrets.API_HASH_CONFIG }} \
            -D DESKTOP_APP_DISABLE_AUTOUPDATE=OFF \
            -D DESKTOP_APP_BUILD_PACKER=ON

      - name: Build Telegram
        env:
          MAKE_THREADS_CNT: -j3
          CMAKE_BUILD_PARALLEL_LEVEL: 3
        run: cmake --build ${{ env.REPO_NAME }}/out --config Release --target Telegram

      - name: Read version info
        run: |
          APP_VERSION=$(grep 'AppVersion ' ${{ env.REPO_NAME }}/Telegram/build/version | awk '{print $2}')
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV

      - name: Sign OTA update
        if: ${{ inputs.build_type == 'rel' }}
        run: |
          PACKER=$(find ${{ env.REPO_NAME }}/out -name Packer -type f | head -1)
          TELEGRAM="${{ env.REPO_NAME }}/out/Release/fagram.app"
          if [ -z "$PACKER" ] || [ ! -d "$TELEGRAM" ]; then
            echo "Error: Packer or fagram.app not found"
            find ${{ env.REPO_NAME }}/out -type f -name 'Packer'
            find ${{ env.REPO_NAME }}/out -type d -name 'fagram.app'
            exit 1
          fi
          chmod +x "$PACKER"
          ./$PACKER -path $TELEGRAM -version $APP_VERSION

      - name: Upload OTA artifact
        if: ${{ inputs.build_type == 'rel' }}
        uses: actions/upload-artifact@v7
        with:
          name: ota-macos
          path: tmacupd${{ env.APP_VERSION }}

      - name: Package DMG
        run: |
          mkdir -p dmg_staging
          cp -r ${{ env.REPO_NAME }}/out/Release/fagram.app dmg_staging/FAgram.app
          ln -s /Applications dmg_staging/Applications
          hdiutil create \
            -volname "FAgram" \
            -srcfolder dmg_staging \
            -ov \
            -format UDZO \
            fagram-mac-${{ env.TAGNAME }}.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: fagram-mac-${{ env.TAGNAME }}
          path: fagram-mac-${{ env.TAGNAME }}.dmg

  upload-telegram:
    name: Upload to Telegram
    needs: build
    if: ${{ !inputs.skip_upload }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          sparse-checkout: |
            scripts/tgupload.py
            Telegram/SourceFiles/fa/fa_version.h

      - name: Extract TGD version
        run: |
          TGD_VERSION=$(grep 'AppTGDVersion' Telegram/SourceFiles/fa/fa_version.h | sed 's/.*"\(.*\)".*/\1/')
          echo "TGD_VERSION=$TGD_VERSION" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install kurigram tgcrypto

      - name: Download macOS artifact
        uses: actions/download-artifact@v8
        with:
          name: fagram-mac-${{ inputs.tagname }}
          path: artifacts/mac

      - name: Upload macOS artifact to Telegram
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          API_ID: ${{ secrets.API_ID_CONFIG }}
          API_HASH: ${{ secrets.API_HASH_CONFIG }}
        run: |
          MAC_FILE=$(find artifacts/mac -name "fagram-mac-*.dmg" | head -1)
          python3 scripts/tgupload.py "$MAC_FILE" --chat-id ${{ secrets.CHAT_ID }} --caption "$(cat <<EOF
          <b>FAgram macOS ${{ inputs.tagname }}</b>
          TGD Base: <code>${{ env.TGD_VERSION }}</code>
          Build Type: <code>${{ inputs.build_type }}</code>
          Branch: <code>${{ github.ref_name }}</code>
          EOF
          )"