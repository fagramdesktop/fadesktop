name: Build macOS

on:
  workflow_dispatch:
    inputs:
      tagname:
        description: "tagname"
        type: string
        required: true
      build_type:
        description: "Build type"
        type: choice
        required: true
        default: "ci"
        options:
          - ci
          - rel
      libs_run_id:
        description: "Run ID to reuse libraries from (skip rebuild)"
        type: string
        required: false
  workflow_call:
    inputs:
      tagname:
        description: "tagname"
        type: string
        required: true
      build_type:
        description: "Build type"
        type: string
        required: true
        default: "ci"
      skip_upload:
        description: "Skip Telegram upload"
        type: boolean
        required: false
        default: false
      libs_run_id:
        description: "Run ID to reuse libraries from (skip rebuild)"
        type: string
        required: false

jobs:
  prepare-libraries:
    name: Prepare Libraries
    if: ${{ !inputs.libs_run_id }}
    runs-on: macos-latest
    timeout-minutes: 240

    steps:
      - name: Resolve paths
        run: |
          echo "LIBS_PATH=$(cd $GITHUB_WORKSPACE && cd .. && pwd)/Libraries" >> $GITHUB_ENV

      - name: Clone repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          brew install automake cmake wget pkg-config gnu-tar ninja nasm meson

      - name: Build libraries
        env:
          MAKE_THREADS_CNT: -j3
          CMAKE_BUILD_PARALLEL_LEVEL: 3
        run: |
          set -euo pipefail
          while true; do
            echo "prepare-libraries is still running at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            sleep 240
          done &
          HEARTBEAT_PID=$!
          trap 'kill "$HEARTBEAT_PID" >/dev/null 2>&1 || true' EXIT
          bash Telegram/build/prepare/mac.sh

      - name: Upload Libraries
        uses: actions/upload-artifact@v7
        with:
          name: libraries-mac
          path: ${{ env.LIBS_PATH }}
          retention-days: 7
          compression-level: 1

  build:
    name: Build macOS
    needs: prepare-libraries
    if: ${{ !cancelled() && (needs.prepare-libraries.result == 'success' || needs.prepare-libraries.result == 'skipped') }}
    runs-on: macos-latest
    outputs:
      tagname: ${{ steps.tagname.outputs.tagname }}
      run_id: ${{ github.run_id }}

    steps:
      - name: Set TAGNAME
        id: tagname
        run: |
          if [ -n "${{ inputs.tagname }}" ]; then
            TAGNAME="${{ inputs.tagname }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAGNAME="${GITHUB_REF#refs/tags/}"
          else
            TAGNAME="${{ github.ref_name }}"
          fi
          echo "TAGNAME=$TAGNAME" >> $GITHUB_ENV
          echo "tagname=$TAGNAME" >> $GITHUB_OUTPUT

      - name: Clone repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Resolve paths
        run: |
          echo "LIBS_PATH=$(cd $GITHUB_WORKSPACE && cd .. && pwd)/Libraries" >> $GITHUB_ENV

      - name: Download Libraries
        uses: actions/download-artifact@v8
        with:
          name: libraries-mac
          path: ${{ env.LIBS_PATH }}
          run-id: ${{ inputs.libs_run_id || github.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone DesktopPrivate
        run: |
          git clone https://x-access-token:${{ secrets.PAT }}@github.com/fagramdesktop/DesktopPrivate.git $GITHUB_WORKSPACE/../DesktopPrivate

      - name: Configure with CMake
        run: |
          cd Telegram
          ./configure.sh \
            -D TDESKTOP_API_ID=${{ secrets.API_ID_CONFIG }} \
            -D TDESKTOP_API_HASH=${{ secrets.API_HASH_CONFIG }} \
            -D DESKTOP_APP_DISABLE_AUTOUPDATE=OFF \
            -D DESKTOP_APP_BUILD_PACKER=ON

      - name: Build Telegram
        run: cmake --build out --config Release --target Telegram

      - name: Read version info
        run: |
          APP_VERSION=$(grep 'AppVersion ' Telegram/build/version | awk '{print $2}')
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV

      - name: Sign OTA update
        if: ${{ inputs.build_type == 'rel' }}
        run: |
          PACKER=$(find out -name Packer -type f | head -1)
          TELEGRAM="out/Release/fagram.app"
          if [ -z "$PACKER" ] || [ ! -d "$TELEGRAM" ]; then
            echo "Error: Packer or fagram.app not found"
            find out -type f -name 'Packer'
            find out -type d -name 'fagram.app'
            exit 1
          fi
          chmod +x "$PACKER"
          ./$PACKER -path $TELEGRAM -version $APP_VERSION

      - name: Upload OTA artifact
        if: ${{ inputs.build_type == 'rel' }}
        uses: actions/upload-artifact@v7
        with:
          name: ota-macos
          path: tmacupd${{ env.APP_VERSION }}

      - name: Package DMG
        run: |
          mkdir -p dmg_staging
          cp -r out/Release/fagram.app dmg_staging/FAgram.app
          ln -s /Applications dmg_staging/Applications
          hdiutil create \
            -volname "FAgram" \
            -srcfolder dmg_staging \
            -ov \
            -format UDZO \
            fagram-mac-${{ env.TAGNAME }}.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: fagram-mac-${{ env.TAGNAME }}
          path: fagram-mac-${{ env.TAGNAME }}.dmg

  upload-telegram:
    name: Upload to Telegram
    needs: build
    if: ${{ !inputs.skip_upload }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            scripts/tgupload.py
            Telegram/SourceFiles/fa/fa_version.h

      - name: Extract TGD version
        run: |
          TGD_VERSION=$(grep 'AppTGDVersion' Telegram/SourceFiles/fa/fa_version.h | sed 's/.*"\(.*\)".*/\1/')
          echo "TGD_VERSION=$TGD_VERSION" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install kurigram tgcrypto

      - name: Download macOS artifact
        uses: actions/download-artifact@v8
        with:
          name: fagram-mac-${{ inputs.tagname }}
          path: artifacts/mac

      - name: Upload macOS artifact to Telegram
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          API_ID: ${{ secrets.API_ID_CONFIG }}
          API_HASH: ${{ secrets.API_HASH_CONFIG }}
        run: |
          MAC_FILE=$(find artifacts/mac -name "fagram-mac-*.dmg" | head -1)
          python3 scripts/tgupload.py "$MAC_FILE" --chat-id ${{ secrets.CHAT_ID }} --caption "$(cat <<EOF
          <b>FAgram macOS ${{ inputs.tagname }}</b>
          TGD Base: <code>${{ env.TGD_VERSION }}</code>
          Build Type: <code>${{ inputs.build_type }}</code>
          Branch: <code>${{ github.ref_name }}</code>
          EOF
          )"
